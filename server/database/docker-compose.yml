services:
  # MongoDB service
  mongo_db:
    container_name: db_container
    image: mongo:5
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

  # Node API service
  api:
    image: nodeapp
    container_name: node_app
    ports:
      - "3030:3030"
    depends_on:
      - mongo_db

volumes:
  mongo_data: